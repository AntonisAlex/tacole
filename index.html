const target = songs[Math.floor(Math.random() * songs.length)];
let attempts = 0;

const datalist = document.getElementById("suggestions");
songs.forEach(song => {
  let option = document.createElement("option");
  option.value = song.title;
  datalist.appendChild(option);
});

function getClass(val, targetVal) {
  if (val === targetVal) return "green";
  if (Math.abs(val - targetVal) <= 2) return "yellow";
  return "gray";
}

function showPopup(message) {
  const popup = document.getElementById('popup');
  popup.textContent = message;
  popup.style.display = 'block';
  setTimeout(() => { popup.style.display = 'none'; }, 2000);
}

function getArrow(val, targetVal) {
  if (val === targetVal) return '';
  return val < targetVal ? '⬆️' : '⬇️';
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60).toString().padStart(2, '0');
  const s = (seconds % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function guessSong() {
  if (attempts >= 8) return showPopup("Koniec gry!");

  const input = document.getElementById("search").value;
  const song = songs.find(s => s.title === input);

  if (!song) return showPopup("Wybierz piosenkę z listy!");

  attempts++;

  const row = document.createElement("tr");
  row.innerHTML = `
    <td class="${song.title === target.title ? 'green' : 'gray'}">${song.title}</td>
    <td class="${getClass(song.year, target.year)}">${song.album} ${getArrow(song.year, target.year)}</td>
    <td class="${getClass(song.track, target.track)}">${song.track} ${getArrow(song.track, target.track)}</td>
    <td class="${getClass(song.length, target.length)}">${formatTime(song.length)} ${getArrow(song.length, target.length)}</td>
    <td class="${song.features === target.features ? 'green' : 'gray'}">${song.features}</td>
  `;

  document.getElementById("tableBody").appendChild(row);

  if (song.title === target.title) {
    showPopup("Wygrałeś!");
  } else if (attempts === 8) {
    showPopup("Przegrałeś! Szukana piosenka to: " + target.title);
  }
}
